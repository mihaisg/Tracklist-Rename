<!DOCTYPE html>

<html lang="en" data-bs-theme="light">
    
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Tracklist Merger</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <script>
        let currentTheme = localStorage.getItem('theme') || 
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-bs-theme', currentTheme);

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-bs-theme', currentTheme);
            localStorage.setItem('theme', currentTheme);
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('themeIcon');
            if (!icon) return;
            if (currentTheme === 'dark') {
                icon.className = 'bi bi-sun-fill text-warning';
            } else {
                icon.className = 'bi bi-moon-stars-fill text-primary';
            }
        }

        document.addEventListener('DOMContentLoaded', updateThemeIcon);
    </script>

    <style>
        #status { display: none; margin-top: 1rem; padding: 1rem; border-radius: 0.5rem; text-align: center; font-weight: 600; }
        .status-error, .status-Error { background-color: var(--bs-danger); color: white; }
        .status-Warning { background-color: var(--bs-warning); color: var(--bs-dark); }
        .status-Success { background-color: var(--bs-success); color: white; }
    </style>
    
</head>
    
<body class="d-flex flex-column align-items-center justify-content-center min-vh-100 bg-body-tertiary p-3 m-0">

<div class="container p-0" style="max-width: 480px;">
    <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5 position-relative bg-body">
        
        <button class="btn btn-sm btn-outline-secondary position-absolute top-0 end-0 m-3 border-0 rounded-circle" onclick="toggleTheme()" title="Toggle Light/Dark Mode">
            <i id="themeIcon" class="bi bi-moon-stars-fill fs-5"></i>
        </button>

        <div class="text-center mb-4 mt-2">
            <h2 class="fw-bold mb-3 text-primary">
                <i class="bi bi-music-note-list me-2"></i>Tracklist Merger
            </h2>
            <p class="lead fw-bold mb-2">Combine two tracklist files into one.</p>
            <p class="mb-0 fw-medium">Best used with the <b>Bulk Rename Utility</b>.</p>
        </div>

        <div class="mb-3">
            <label for="fileA" class="form-label fw-semibold">
                <i class="bi bi-file-earmark-text text-info me-1"></i> Original Tracklist (File A):
            </label>
            <input class="form-control" type="file" id="fileA" accept=".txt">
        </div>
        
        <div class="mb-4">
            <label for="fileB" class="form-label fw-semibold">
                <i class="bi bi-file-earmark-text-fill text-info me-1"></i> Edited Tracklist (File B):
            </label>
            <input class="form-control" type="file" id="fileB" accept=".txt">
        </div>
        
        <div class="d-flex gap-2">
            <button class="btn btn-success flex-grow-1 py-2 fw-bold shadow-sm" onclick="processFiles()">
                <i class="bi bi-cloud-arrow-down-fill fs-5 align-middle me-1"></i> 
                <span class="d-none d-sm-inline align-middle">Merge and Download</span>
            </button>
            <button class="btn btn-danger px-4 py-2 fw-bold shadow-sm" onclick="clearFields()" title="Clear inputs">
                <i class="bi bi-trash3-fill fs-5 align-middle me-1"></i> 
                <span class="d-none d-sm-inline align-middle">Clear All</span>
            </button>
        </div>

        <div id="status" class="shadow-sm"></div>
    </div>

    <div class="text-center mt-4 text-success h3 fw-bold">
        Made by SMG - 2026
    </div>
</div>

<script>
    function showStatus(message, type) {
        const statusBox = document.getElementById('status');
        statusBox.textContent = message;
        statusBox.className = `status-${type}`;
        statusBox.style.display = 'block';
    }

    async function processFiles() {
        const fileA = document.getElementById('fileA').files[0];
        const fileB = document.getElementById('fileB').files[0];
        const statusBox = document.getElementById('status');
        
        statusBox.style.display = 'none'; // Reset status on new click

        if (!fileA || !fileB) {
            showStatus("Please upload both File A and File B.", "error");
            return;
        }

        try {
            const textA = await fileA.text();
            const textB = await fileB.text();

            const linesA = textA.split(/\r?\n/).filter(line => line.trim() !== "");
            const linesB = textB.split(/\r?\n/).filter(line => line.trim() !== "");

            let warningMsg = "";
            if (linesA.length !== linesB.length) {
                warningMsg = `Warning: Files have different lengths (${linesA.length} vs ${linesB.length} lines). Merged up to the shortest file.`;
            }

            let output = "";
            const rowCount = Math.min(linesA.length, linesB.length);

            for (let i = 0; i < rowCount; i++) {
                output += `${linesA[i]}|${linesB[i]}.mp3\n`;
            }

            downloadResult(output);

            if (warningMsg) {
                showStatus(warningMsg, "Warning");
            } else {
                showStatus("Success! Your tracklist have been merged and downloaded.", "Success");
            }
            
        } catch (error) {
            showStatus("An error occurred while reading the files.", "Error");
        }
    }

    function downloadResult(content) {
        const element = document.createElement('a');
        const file = new Blob([content], {type: 'text/plain'});
        element.href = URL.createObjectURL(file);
        element.download = "Output.txt";
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
    }

    function clearFields() {
        document.getElementById('fileA').value = '';
        document.getElementById('fileB').value = '';
        document.getElementById('status').style.display = 'none';
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
    
</html>
