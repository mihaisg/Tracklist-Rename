<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracklist Merger</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <script>
        let currentTheme = localStorage.getItem('theme') || 
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-bs-theme', currentTheme);

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-bs-theme', currentTheme);
            localStorage.setItem('theme', currentTheme);
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('themeIcon');
            if (!icon) return;
            if (currentTheme === 'dark') {
                icon.className = 'bi bi-sun-fill text-warning';
            } else {
                icon.className = 'bi bi-moon-stars-fill text-primary';
            }
        }

        document.addEventListener('DOMContentLoaded', updateThemeIcon);
    </script>

    <style>
        body {
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px; 
            transition: background 0.5s ease;
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        [data-bs-theme="light"] body {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
        }

        [data-bs-theme="dark"] body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
        }

        .merge-card {
            width: 100%;
            max-width: 480px;
            border-radius: 16px;
            position: relative;
            backdrop-filter: blur(10px);
        }

        [data-bs-theme="light"] .merge-card {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        [data-bs-theme="dark"] .merge-card {
            background: rgba(33, 37, 41, 0.95);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border-color: #373b3e;
        }

        /* Green Button styling with enhanced hover */
        .btn-green-gradient {
            background: linear-gradient(45deg, #10b981, #059669);
            color: white;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-green-gradient:hover {
            background: linear-gradient(45deg, #059669, #047857);
            color: white;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-green-gradient:active {
            transform: translateY(0) scale(1);
        }

        /* Red Button styling with enhanced hover */
        .btn-red-gradient {
            background: linear-gradient(45deg, #ef4444, #dc2626);
            color: white;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-red-gradient:hover {
            background: linear-gradient(45deg, #dc2626, #b91c1c);
            color: white;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
        }

        .btn-red-gradient:active {
            transform: translateY(0) scale(1);
        }

        .theme-toggle-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: transform 0.2s;
            z-index: 10;
        }

        .theme-toggle-btn:hover {
            transform: rotate(15deg) scale(1.1);
        }

        /* Custom Footer Text Styling - Dark Green Theme */
        .footer-text {
            margin-top: 24px;
            font-size: 1.25rem; 
            font-weight: 700; 
            letter-spacing: 0.5px;
            transition: color 0.5s ease;
            text-align: center;
        }

        /* Deep Forest Green that looks elegant on light backgrounds */
        [data-bs-theme="light"] .footer-text { color: #065f46; }
        
        /* Bright Emerald Green that pops perfectly on dark backgrounds */
        [data-bs-theme="dark"] .footer-text { color: #10b981; }

        /* Pure CSS Styling for your original JS Status Classes */
        #status {
            margin-top: 20px;
            font-size: 0.95rem;
            text-align: center;
            border-radius: 8px;
            padding: 12px;
            display: none;
            font-weight: 600;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .status-error, .status-Error { background: #dc3545; color: white; }
        .status-Warning { background: #ffc107; color: #212529; }
        .status-Success { background: #198754; color: white; }
    </style>
</head>
<body>

<div class="card merge-card p-3 p-sm-4 p-md-5 border-0">
    <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Light/Dark Mode">
        <i id="themeIcon" class="bi bi-moon-stars-fill"></i>
    </button>

    <div class="text-center mb-4 mt-2">
        <h2 class="fw-bold mb-3 text-primary">
            <i class="bi bi-music-note-list me-2"></i>Tracklist Merger
        </h2>
        <p class="lead fw-bold mb-2">Combine two tracklist files into one</p>
        <p class="mb-0 fw-medium">Best used with the <b>Bulk Rename Utility</b></p>
    </div>

    <div class="mb-3">
        <label for="fileA" class="form-label fw-semibold">
            <i class="bi bi-file-earmark-text text-info me-1"></i> Original Tracklist (File A):
        </label>
        <input class="form-control" type="file" id="fileA" accept=".txt">
    </div>
    
    <div class="mb-4">
        <label for="fileB" class="form-label fw-semibold">
            <i class="bi bi-file-earmark-text-fill text-info me-1"></i> Edited Tracklist (File B):
        </label>
        <input class="form-control" type="file" id="fileB" accept=".txt">
    </div>
    
    <div class="d-flex gap-2">
        <button class="btn btn-green-gradient flex-grow-1 py-3 py-sm-2 fw-bold d-flex align-items-center justify-content-center gap-2" onclick="processFiles()">
            <i class="bi bi-cloud-arrow-down-fill fs-5"></i> <span class="d-none d-sm-inline">Merge and Download</span>
        </button>
        <button class="btn btn-red-gradient px-4 py-3 py-sm-2 fw-bold d-flex align-items-center justify-content-center gap-2" onclick="clearFields()">
            <i class="bi bi-trash3-fill fs-5"></i> <span class="d-none d-sm-inline">Clear All</span>
        </button>
    </div>

    <div id="status"></div>
</div>

<div class="footer-text">
    Made by SMG - 2026
</div>

<script>
    function showStatus(message, type) {
        const statusBox = document.getElementById('status');
        statusBox.textContent = message;
        statusBox.className = `status-${type}`;
        statusBox.style.display = 'block';
    }

    async function processFiles() {
        const fileA = document.getElementById('fileA').files[0];
        const fileB = document.getElementById('fileB').files[0];
        const statusBox = document.getElementById('status');
        
        statusBox.style.display = 'none'; // Reset status on new click

        if (!fileA || !fileB) {
            showStatus("Please upload both File A and File B", "error");
            return;
        }

        try {
            const textA = await fileA.text();
            const textB = await fileB.text();

            const linesA = textA.split(/\r?\n/).filter(line => line.trim() !== "");
            const linesB = textB.split(/\r?\n/).filter(line => line.trim() !== "");

            let warningMsg = "";
            if (linesA.length !== linesB.length) {
                warningMsg = `Warning: Files have different lengths (${linesA.length} vs ${linesB.length} lines). Merged up to the shortest file`;
            }

            let output = "";
            const rowCount = Math.min(linesA.length, linesB.length);

            for (let i = 0; i < rowCount; i++) {
                output += `${linesA[i]}|${linesB[i]}.mp3\n`;
            }

            downloadResult(output);

            if (warningMsg) {
                showStatus(warningMsg, "Warning");
            } else {
                showStatus("Success! Your tracklist have been merged and downloaded", "Success");
            }
            
        } catch (error) {
            showStatus("An error occurred while reading the files", "Error");
        }
    }

    function downloadResult(content) {
        const element = document.createElement('a');
        const file = new Blob([content], {type: 'text/plain'});
        element.href = URL.createObjectURL(file);
        element.download = "Output.txt";
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
    }

    /* NEW CLEAR FUNCTION */
    function clearFields() {
        document.getElementById('fileA').value = '';
        document.getElementById('fileB').value = '';
        document.getElementById('status').style.display = 'none';
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
